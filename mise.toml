[tools]
go = "1.26.1"

[tasks.build]
description = "x CLI をローカルビルド (ldflags でバージョン情報を注入)"
run = """
go build -ldflags="-X github.com/youyo/x/internal/version.Version=$(git describe --tags --always --dirty 2>/dev/null || echo dev) \
  -X github.com/youyo/x/internal/version.Commit=$(git rev-parse --short HEAD 2>/dev/null || echo unknown) \
  -X github.com/youyo/x/internal/version.Date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
  -o ./x ./cmd/x
"""
