# リリースワークフロー
#
# トリガー: v* タグ push のみ。
# ジョブ: goreleaser 単一ジョブ。darwin/linux × amd64/arm64 バイナリ + tarball、
#         GitHub Releases 投稿、Homebrew tap 更新、ghcr.io multi-arch image push。
#
# 必須 secrets:
#   - APP_ID: youyo/homebrew-tap への push 権限を持つ GitHub App の ID
#   - APP_PRIVATE_KEY: 同 App の private key (PEM)
#   - GITHUB_TOKEN: GitHub Releases 投稿 + ghcr.io login (デフォルト付与)
#
# permissions:
#   - contents: write   GitHub Releases 投稿に必要
#   - packages: write   ghcr.io へのイメージ push に必要
#
# 設計判断 (logvalet 流):
#   - Homebrew tap への push は GitHub App token を tibdex/github-app-token で動的生成。
#     PAT より権限が絞れ、有効期限も短い (1 時間)。
#   - すべての action は SHA pin (Dependabot/pinact による更新前提、supply chain 対策)。
#   - docker/setup-qemu + setup-buildx は .goreleaser.yaml の dockers が
#     use: buildx + --platform=linux/{amd64,arm64} を要求するため必須。
#   - 既存 ci.yml と分離: ci.yml は main への push/PR、release.yml は v* タグ push。

name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # 全タグ参照 (changelog 生成に必要)

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Set up QEMU (multi-arch docker)
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Login to ghcr.io
        uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1 # v3.5.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate GitHub App token
        id: app-token
        uses: tibdex/github-app-token@3beb63f4bd073e61482598c45c71c1019b59b73a # v2.1.0
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7.2.1
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ github.token }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
